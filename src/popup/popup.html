<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Commenter Settings</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f14;
      --surface: #1a1a24;
      --border: #2e2e42;
      --accent: #7c6af7;
      --accent-dim: rgba(124, 106, 247, 0.15);
      --text: #e8e8f0;
      --muted: #7a7a90;
      --success: #4ade80;
      --error: #f87171;
      --radius: 8px;
    }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      padding: 0 0 12px;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: grid;
      place-items: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    header p {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ── Status pill ── */
    #ollama-status {
      margin: 12px 16px 0;
      padding: 7px 10px;
      border-radius: var(--radius);
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    #ollama-status.connected { border-color: var(--success); color: var(--success); }
    #ollama-status.error     { border-color: var(--error);   color: var(--error); }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    /* ── Form ── */
    .form-body {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    select, input, textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      padding: 8px 10px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }

    select:focus, input:focus, textarea:focus {
      border-color: var(--accent);
    }

    textarea {
      resize: vertical;
      min-height: 64px;
      line-height: 1.5;
    }

    .char-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .char-row input[type="range"] {
      flex: 1;
      padding: 0;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .char-value {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      min-width: 36px;
      text-align: right;
    }

    /* ── Buttons ── */
    .actions {
      padding: 0 16px;
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      padding: 9px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    #save-btn {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    #save-btn:hover { opacity: 0.85; }

    #reset-btn {
      background: transparent;
      color: var(--muted);
    }

    #reset-btn:hover { border-color: var(--error); color: var(--error); }

    /* ── Save confirmation ── */
    #save-confirm {
      text-align: center;
      font-size: 11px;
      color: var(--success);
      margin: 8px 16px 0;
      min-height: 16px;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">✨</div>
    <div>
      <h1>AI Commenter</h1>
      <p>Select post text → Right-click → Generate</p>
    </div>
  </header>

  <div id="ollama-status">
    <span class="status-dot"></span>
    <span id="status-text">Checking Ollama…</span>
  </div>

  <div class="form-body">

    <div class="field">
      <label for="model-select">Model</label>
      <select id="model-select">
        <option value="">Loading models…</option>
      </select>
    </div>

    <div class="field">
      <label for="tone-select">Tone</label>
      <select id="tone-select">
        <option value="professional">Professional &amp; Insightful</option>
        <option value="friendly">Warm &amp; Friendly</option>
        <option value="witty">Clever &amp; Witty</option>
        <option value="concise">Brief &amp; Concise</option>
        <option value="supportive">Encouraging &amp; Supportive</option>
      </select>
    </div>

    <div class="field">
      <label for="char-limit">Max Length</label>
      <div class="char-row">
        <input type="range" id="char-limit" min="50" max="500" step="25" value="300" />
        <span class="char-value" id="char-display">300</span>
      </div>
    </div>

    <div class="field">
      <label for="persona">Your Persona <span style="opacity:0.5;font-weight:400">(optional)</span></label>
      <textarea
        id="persona"
        placeholder="e.g. Senior software engineer interested in AI and distributed systems"
      ></textarea>
    </div>

  </div>

  <div class="actions">
    <button id="reset-btn">Reset</button>
    <button id="save-btn">Save Settings</button>
  </div>

  <div id="save-confirm"></div>

  <script type="module" src="popup.js"></script>
</body>
</html>
