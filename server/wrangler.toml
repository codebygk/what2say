# ─────────────────────────────────────────────
#  Wrangler config - Cloudflare Worker
#  Deploy with: npx wrangler deploy
# ─────────────────────────────────────────────

name = "zapcomment-license"
main = "src/index.js"
compatibility_date = "2026-03-04"

# KV namespace - stores all license data
# After creating with `npx wrangler kv:namespace create LICENSES`
# paste the id below
[[kv_namespaces]]
binding = "LICENSES"
id = "1eafeb1097344d4a9b87d91cacd6b2ed"

